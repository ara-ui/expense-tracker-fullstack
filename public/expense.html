<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link rel="stylesheet" href="css/expense.css">

</head>
<body>

    <button id="rzp-button1">Buy Premium Membership</button>

    <div class="premium-section">
        <h2 id="premiumMessage"></h2>

        <div id="premiumNav" class="premium-nav">
            <a href="expense.html" class="nav-link active">
                Dashboard
            </a>
            <a href="leaderboard.html" class="nav-link">
                Leaderboard
            </a>
            <a href="reports.html" class="nav-link">
                Reports
            </a>

        </div>
    </div>

<!--drop down page limit-->

  <div class="top-controls">

    <div class="page-limit">

        <label for="rowsPerPage">Expenses per page:</label>

        <select id="rowsPerPage">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
        </select>

    </div>

    <button id="downloadBtn" class="download-btn">
        ⬇ Download Expenses
    </button>

</div>

<div id="downloadLink" class="download-link"></div>

    <form id="expenseForm">
        <label>Choose expense amount</label>
        <input type="number" id="amount" required>

        <label >Description</label>
        <input type="text" id="description" required>

    
        <button type="submit">Add Expense</button>
    </form>

    <div id="loading" style="display:none;">
    <div class="spinner"></div>
    <p>Categorizing expense with AI...</p>
</div>
    <h1>Expenses</h1>

    <ul id="expenseList"></ul>
    <div id="pagination"></div>

    
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode/build/jwt-decode.min.js"></script>
    
    <script src="js/modules/config.js"></script>
    <script src="js/modules/pagination.js"></script>
    <script src="js/modules/premium.js"></script>
    <script src="js/modules/expenses.js"></script>
   
    
    <script src="js/expense.js"></script>
</body>
</html>
