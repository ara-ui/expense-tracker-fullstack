<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Report</title>

    <link rel="stylesheet" href="css/reports.css">

</head>

<body>

<div class="container">

    <h1>Expense Report</h1>

    <div class="tabs">

        <button class="tab active" data-view="daily">Daily</button>

        <button class="tab" data-view="weekly">Weekly</button>

        <button class="tab" data-view="monthly">Monthly</button>

        <button class="tab" data-view="yearly">Yearly</button>

    </div>

    <div class="date-picker">

        <button id="prevBtn">◀</button>

        <span></span>

        <button id="nextBtn">▶</button>

    </div>

    <div class="summary">

        <div class="card">

            <h3>Income</h3>

            <h2 id="income">₹0</h2>

        </div>

        <div class="card">

            <h3>Expense</h3>

            <h2 id="expense">₹0</h2>

        </div>

        <div class="card">

            <h3>Savings</h3>

            <h2 id="saving">₹0</h2>

        </div>

    </div>

    <table>

        <thead>

            <tr>

                <th>Date</th>

                <th>Description</th>

                <th>Category</th>

                <th>Amount</th>

            </tr>

        </thead>

        <tbody id="reportBody">

        </tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="js/reports.js"></script>

</body>

</html>
